<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1c1c1c"/>
      <stop offset="100%" stop-color="#060606"/>
    </radialGradient>
  </defs>

  <!-- Dark background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Code icon — two thick angle brackets < > -->
  <!-- Left bracket < -->
  <polyline
    points="610,170 460,315 610,460"
    fill="none"
    stroke="white"
    stroke-width="58"
    stroke-linecap="square"
    stroke-linejoin="miter"
    stroke-miterlimit="10"
  />
  <!-- Right bracket > -->
  <polyline
    points="590,170 740,315 590,460"
    fill="none"
    stroke="white"
    stroke-width="58"
    stroke-linecap="square"
    stroke-linejoin="miter"
    stroke-miterlimit="10"
  />

  <!-- 404foundstudio watermark text bottom right -->
  <text
    x="1140"
    y="600"
    font-family="Courier New, monospace"
    font-size="18"
    fill="#444444"
    text-anchor="end"
    letter-spacing="3"
  >404foundstudio</text>
</svg>
